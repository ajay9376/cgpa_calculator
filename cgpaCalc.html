<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0b12; --surf:#14141f; --surf2:#1c1c2e; --surf3:#24243a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --accent:#7c6fff; --accent2:#b39dff; --aglow:rgba(124,111,255,0.14);
  --green:#10b981; --gdim:rgba(16,185,129,0.14);
  --amber:#f59e0b; --adim:rgba(245,158,11,0.14);
  --red:#ef4444; --rdim:rgba(239,68,68,0.13);
  --blue:#3b82f6; --bdim:rgba(59,130,246,0.13);
  --text:#eeeeff; --t2:#8888aa; --t3:#55556a;
  --r:12px; --rsm:8px; --rlg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6;}
body::before{content:'';position:fixed;top:-150px;left:-150px;width:550px;height:550px;background:radial-gradient(circle,rgba(124,111,255,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-150px;right:-150px;width:450px;height:450px;background:radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(11,11,18,0.9);backdrop-filter:blur(14px);position:sticky;top:0;z-index:200;}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px;cursor:pointer;}
.brand span{color:var(--accent2);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-pill{font-size:13px;padding:5px 14px;background:var(--aglow);border:1px solid rgba(124,111,255,0.28);border-radius:99px;color:var(--accent2);}
.nav-profile-btn{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--surf2);border:1px solid var(--border2);border-radius:99px;cursor:pointer;transition:all .18s;font-size:14px;color:var(--t2);}
.nav-profile-btn:hover{border-color:var(--accent);color:var(--text);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--aglow);border:1px solid rgba(124,111,255,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent2);font-family:'Syne',sans-serif;flex-shrink:0;}

/* SETUP */
#setup-screen{min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.setup-card{width:100%;max-width:520px;background:var(--surf);border:1px solid var(--border2);border-radius:var(--rlg);padding:44px;animation:fadeUp .45s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.setup-icon{width:58px;height:58px;background:var(--aglow);border:1px solid rgba(124,111,255,0.28);border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:22px;font-size:26px;}
.setup-card h2{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:8px;}
.setup-card p{font-size:15px;color:var(--t2);margin-bottom:32px;line-height:1.65;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:12px;letter-spacing:.8px;color:var(--t3);text-transform:uppercase;margin-bottom:8px;font-weight:500;}
.field input,.field select{width:100%;padding:13px 16px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .18s;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--t3);}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.start-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .18s;margin-top:10px;}
.start-btn:hover{background:#8f84ff;transform:translateY(-1px);}

/* MAIN LAYOUT */
#main-app{display:none;}
.layout{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 61px);}

/* SIDEBAR */
.sidebar{background:var(--surf);border-right:1px solid var(--border);position:sticky;top:61px;height:calc(100vh - 61px);overflow-y:auto;display:flex;flex-direction:column;}
.sb-top{padding:22px 20px;border-bottom:1px solid var(--border);}
.sb-branch{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-sub{font-size:13px;color:var(--t3);margin-bottom:16px;}
.cgpa-box{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
.cgpa-lbl{font-size:11px;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;}
.cgpa-val{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cgpa-note{font-size:12px;color:var(--t3);margin-top:5px;}
.sb-nav{flex:1;padding:14px 12px;}
.sb-sec{font-size:11px;letter-spacing:.9px;color:var(--t3);text-transform:uppercase;padding:0 8px;margin:14px 0 8px;font-weight:500;}
.sb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 13px;background:transparent;border:none;border-radius:var(--rsm);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:3px;}
.sb-btn:hover{background:var(--surf2);color:var(--text);}
.sb-btn.active{background:var(--aglow);color:var(--accent2);border:1px solid rgba(124,111,255,0.2);}
.chip{font-size:13px;padding:3px 9px;border-radius:99px;font-weight:500;}
.cg{background:var(--gdim);color:var(--green);}
.ca{background:var(--adim);color:var(--amber);}
.cr{background:var(--rdim);color:var(--red);}
.ce{background:var(--surf3);color:var(--t3);}
.sb-footer{padding:16px 20px;border-top:1px solid var(--border);}
.reset-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--border2);border-radius:var(--rsm);color:var(--t3);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* CONTENT */
.content{padding:36px 40px;overflow-y:auto;}
.pg-hdr{margin-bottom:28px;}
.pg-hdr h2{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:6px;}
.pg-hdr p{font-size:15px;color:var(--t2);}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;}
.slbl{font-size:12px;letter-spacing:.7px;color:var(--t3);text-transform:uppercase;margin-bottom:8px;font-weight:500;}
.sval{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;}
.ssub{font-size:13px;color:var(--t3);margin-top:5px;}

/* TABLE */
.tcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:22px;}
.tcard-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tcard-hdr h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;}
.tcard-hdr span{font-size:14px;color:var(--t2);}
table{width:100%;border-collapse:collapse;}
thead th{padding:12px 18px;text-align:left;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--border);font-weight:500;}
tbody td{padding:14px 18px;font-size:15px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,0.018);}

.cat-pill{display:inline-block;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:500;}
.cHUM{background:rgba(167,139,250,0.14);color:#b39dff;}
.cSCI{background:var(--gdim);color:var(--green);}
.cCSE{background:var(--bdim);color:#60a5fa;}
.cENGG{background:var(--adim);color:var(--amber);}
.cPRJ{background:var(--rdim);color:#f87171;}
.ccustom{background:var(--surf3);color:var(--t2);}
.cr-pill{display:inline-block;padding:4px 11px;background:var(--surf2);border:1px solid var(--border);border-radius:99px;font-size:13px;color:var(--t2);}

/* GRADE SELECT */
.gsel{padding:9px 13px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none;min-width:110px;}
.gsel:focus{border-color:var(--accent);}
.gO{border-color:var(--green);color:var(--green);}
.gAp{border-color:#34d399;color:#34d399;}
.gA{border-color:#6ee7b7;color:#6ee7b7;}
.gBp{border-color:var(--amber);color:var(--amber);}
.gB{border-color:#fbbf24;color:#fbbf24;}
.gC{border-color:#fb923c;color:#fb923c;}
.gP{border-color:#94a3b8;color:#94a3b8;}
.gF{border-color:var(--red);color:var(--red);}

/* MODE TOGGLE */
.mode-toggle{display:flex;background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:4px;gap:4px;margin-bottom:24px;width:fit-content;}
.mode-btn{padding:10px 22px;border-radius:7px;border:none;background:transparent;color:var(--t2);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;transition:all .15s;font-weight:500;}
.mode-btn.active{background:var(--surf3);color:var(--text);border:1px solid var(--border2);}

/* MANUAL BOX */
.manual-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:36px;display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:22px;}
.manual-box p{font-size:16px;color:var(--t2);text-align:center;line-height:1.65;}
.sgpa-big{width:200px;text-align:center;padding:18px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:40px;font-weight:700;outline:none;transition:border-color .18s;}
.sgpa-big:focus{border-color:var(--accent);}
.sgpa-big::placeholder{color:var(--t3);}
.save-btn{padding:13px 36px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .18s;}
.save-btn:hover{background:#8f84ff;}

/* ADD ROW */
.add-row td{background:var(--surf2);}
.add-inner{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.ai{padding:10px 14px;background:var(--surf3);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.ai:focus{border-color:var(--accent);}
.ai::placeholder{color:var(--t3);}
.ai.w{width:240px;}
.ai.n{width:100px;}
.add-btn{padding:10px 20px;background:var(--aglow);border:1px solid rgba(124,111,255,0.28);border-radius:var(--rsm);color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
.add-btn:hover{background:rgba(124,111,255,0.25);}
.del-btn{padding:7px 13px;background:transparent;border:1px solid var(--border);border-radius:var(--rsm);color:var(--t3);font-size:13px;cursor:pointer;transition:all .15s;}
.del-btn:hover{border-color:var(--red);color:var(--red);}
.pf-note{font-size:12px;color:var(--t3);margin-left:6px;}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin-bottom:26px;}
.ov-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .16s;}
.ov-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.ov-num{font-size:13px;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.ov-sgpa{font-family:'Syne',sans-serif;font-size:34px;font-weight:700;}
.ov-cr{font-size:13px;color:var(--t3);margin-top:6px;}
.ov-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;margin-top:8px;}

/* BAR CHART */
.chart-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px;margin-bottom:22px;}
.chart-card h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;margin-bottom:22px;}
.bars{display:flex;align-items:flex-end;gap:10px;height:140px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;}
.bar-fill-wrap{width:100%;flex:1;display:flex;align-items:flex-end;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height .4s ease;}
.bar-v{font-size:12px;color:var(--t2);}
.bar-l{font-size:13px;color:var(--t3);}

/* GRADING REF */
.gref{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px;}
.gref h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;margin-bottom:18px;}
.gref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;}
.gref-item{background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:13px 15px;display:flex;justify-content:space-between;align-items:center;}
.gref-l{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;}
.gref-p{font-size:15px;color:var(--t2);}
.gref-n{font-size:11px;color:var(--t3);margin-top:2px;}

/* PROFILE */
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.prof-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px;}
.prof-card h3{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;margin-bottom:20px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;}
.big-av{width:74px;height:74px;border-radius:50%;background:var(--aglow);border:2px solid rgba(124,111,255,0.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:30px;font-weight:700;color:var(--accent2);}
.pf{margin-bottom:16px;}
.pf label{display:block;font-size:12px;letter-spacing:.7px;color:var(--t3);text-transform:uppercase;margin-bottom:7px;font-weight:500;}
.pf input,.pf select{width:100%;padding:12px 14px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .18s;appearance:none;-webkit-appearance:none;}
.pf input:focus{border-color:var(--accent);}
.pf input::placeholder{color:var(--t3);}
.save-prof-btn{padding:12px 28px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;}
.save-prof-btn:hover{background:#8f84ff;}
.sem-bars{display:flex;flex-direction:column;gap:12px;}
.sem-bar-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surf2);border-radius:var(--rsm);border:1px solid var(--border);}
.sbr-lbl{font-size:14px;color:var(--t3);width:85px;}
.sbr-wrap{flex:1;height:8px;background:var(--surf3);border-radius:4px;overflow:hidden;}
.sbr-fill{height:100%;border-radius:4px;transition:width .4s;}
.sbr-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;width:55px;text-align:right;}

/* TARGET PLANNER */
.tplan-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:30px 34px;margin-bottom:22px;}
.tplan-card h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;margin-bottom:6px;}
.tplan-card > p{font-size:15px;color:var(--t2);margin-bottom:26px;line-height:1.65;}
.t-inputs{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:26px;}
.ti{display:flex;flex-direction:column;gap:8px;}
.ti label{font-size:12px;letter-spacing:.7px;color:var(--t3);text-transform:uppercase;font-weight:500;}
.ti input,.ti select{padding:13px 16px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .18s;appearance:none;-webkit-appearance:none;min-width:170px;}
.ti input:focus,.ti select:focus{border-color:var(--accent);}
.ti input::placeholder{color:var(--t3);}
.calc-btn{padding:13px 30px;background:var(--accent);border:none;border-radius:var(--rsm);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;align-self:flex-end;}
.calc-btn:hover{background:#8f84ff;}
.t-impossible{background:var(--rdim);border:1px solid rgba(239,68,68,0.25);border-radius:var(--r);padding:20px 24px;margin-bottom:18px;display:flex;gap:16px;}
.t-impossible h4{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--red);margin-bottom:5px;}
.t-impossible p{font-size:14px;color:#fca5a5;line-height:1.65;}
.t-possible{background:var(--gdim);border:1px solid rgba(16,185,129,0.22);border-radius:var(--r);padding:20px 24px;margin-bottom:18px;}
.t-possible h4{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--green);margin-bottom:5px;}
.t-possible p{font-size:14px;color:#6ee7b7;line-height:1.65;}
.req-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:18px;}
.req-card{background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:18px 20px;text-align:center;}
.req-sn{font-size:12px;color:var(--t3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.7px;}
.req-v{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;}
.req-note{font-size:12px;color:var(--t3);margin-top:5px;}

@media(max-width:860px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:relative;height:auto;top:0;border-right:none;border-bottom:1px solid var(--border);}
  .content{padding:24px 20px;}
  .stat-row{grid-template-columns:1fr 1fr;}
  .prof-grid{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">

<nav>
  <div class="brand" onclick="goHome()">CGPA<span>Calc</span></div>
  <div class="nav-right">
    <div class="nav-pill">Amrita University</div>
    <div class="nav-profile-btn" onclick="showPage('profile')" id="nav-prof-btn">
      <div class="avatar" id="nav-av">?</div>
      <span id="nav-name">Profile</span>
    </div>
  </div>
</nav>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-icon">🎓</div>
    <h2>CGPA Calculator</h2>
    <p>Track grades, plan goals, and visualise your academic journey across all 8 semesters.</p>
    <div class="field-row">
      <div class="field"><label>Your Name</label><input id="sn" type="text" placeholder="e.g. Ajay Kumar"></div>
      <div class="field"><label>Roll Number</label><input id="sr" type="text" placeholder="CB.EN.U4CSE21001"></div>
    </div>
    <div class="field">
      <label>Branch</label>
      <div class="sel-wrap">
        <select id="sb">
          <option value="">Select branch</option>
          <option value="CSE">Computer Science &amp; Engineering (CSE)</option>
          <option value="CYS">Cyber Security (CYS)</option>
          <option value="ECE">Electronics &amp; Communication (ECE)</option>
          <option value="MECH">Mechanical Engineering</option>
          <option value="CIVIL">Civil Engineering</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Batch / Year</label><input id="sy" type="text" placeholder="e.g. 2023–2027"></div>
      <div class="field">
        <label>Current Semester</label>
        <div class="sel-wrap">
          <select id="ss">
            <option value="">Select</option>
            <option value="1">Semester 1</option><option value="2">Semester 2</option>
            <option value="3">Semester 3</option><option value="4">Semester 4</option>
            <option value="5">Semester 5</option><option value="6">Semester 6</option>
            <option value="7">Semester 7</option><option value="8">Semester 8</option>
          </select>
        </div>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input id="se" type="email" placeholder="you@example.com"></div>
      <div class="field"><label>Phone</label><input id="sp" type="text" placeholder="+91 XXXXX XXXXX"></div>
    </div>
    <button class="start-btn" onclick="startApp()">Start calculating →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-top">
        <div class="sb-branch" id="sb-branch">—</div>
        <div class="sb-sub" id="sb-sub">—</div>
        <div class="cgpa-box">
          <div class="cgpa-lbl">Overall CGPA</div>
          <div class="cgpa-val" id="sb-cgpa">—</div>
          <div class="cgpa-note" id="sb-note">no data yet</div>
        </div>
      </div>
      <div class="sb-nav">
        <div class="sb-sec">Pages</div>
        <button class="sb-btn" onclick="showPage('overview')" id="nav-overview">📊  Overview</button>
        <button class="sb-btn" onclick="showPage('target')" id="nav-target">🎯  Target Planner</button>
        <button class="sb-btn" onclick="showPage('profile')" id="nav-profile">👤  My Profile</button>
        <div class="sb-sec" style="margin-top:18px;">Semesters</div>
        <div id="sem-nav"></div>
      </div>
      <div class="sb-footer">
        <button class="reset-btn" onclick="resetApp()">↩ Reset / Change details</button>
      </div>
    </aside>
    <main class="content" id="content"></main>
  </div>
</div>

</div>
<script>
/* DATA */
const GP={O:10,'A+':9.5,A:9,'B+':8,B:7,C:6,P:5,F:0};
const GRADES=['O','A+','A','B+','B','C','P','F'];

const CSE={
  1:[
    {cat:'HUM',code:'23ENG101',title:'Technical Communication',cr:3,pf:false},
    {cat:'SCI',code:'23MAT107',title:'Calculus',cr:4,pf:false},
    {cat:'CSE',code:'23CSE101',title:'Computational Problem Solving',cr:4,pf:false},
    {cat:'ENGG',code:'23EEE104',title:'Intro to Electrical and Electronics Engineering',cr:3,pf:false},
    {cat:'ENGG',code:'23EEE184',title:'Basic Electrical and Electronics Engineering Practice',cr:1,pf:false},
    {cat:'ENGG',code:'23CSE102',title:'Computer Hardware Essentials',cr:2,pf:false},
    {cat:'HUM',code:'22ADM101',title:'Foundations of Indian Heritage',cr:2,pf:false},
    {cat:'HUM',code:'22AVP103',title:'Mastery Over Mind',cr:2,pf:false},
  ],
  2:[
    {cat:'SCI',code:'23MAT116',title:'Discrete Mathematics',cr:4,pf:false},
    {cat:'SCI',code:'23MAT117',title:'Linear Algebra',cr:4,pf:false},
    {cat:'CSE',code:'23CSE111',title:'Object Oriented Programming',cr:4,pf:false},
    {cat:'SCI',code:'23PHY115',title:'Modern Physics',cr:3,pf:false},
    {cat:'CSE',code:'23CSE113',title:'User Interface Design',cr:3,pf:false},
    {cat:'ENGG',code:'23MEE115',title:'Manufacturing Practice',cr:1,pf:false},
    {cat:'HUM',code:'22ADM111',title:'Glimpses of Glorious India',cr:2,pf:false},
  ],
  3:[
    {cat:'SCI',code:'23MAT3XX',title:'Optimization Techniques',cr:4,pf:false},
    {cat:'ENGG',code:'23ECE3XX',title:'Digital Electronics and Systems',cr:3,pf:false},
    {cat:'CSE',code:'23CSE3XA',title:'Procedural Programming',cr:4,pf:false},
    {cat:'CSE',code:'23CSE3XB',title:'Database Management Systems',cr:4,pf:false},
    {cat:'CSE',code:'23CSE3XC',title:'Data Structures and Algorithms',cr:5,pf:false},
    {cat:'ENGG',code:'23ECE3XA',title:'Digital Electronics and Systems Lab',cr:1,pf:false},
    {cat:'HUM',code:'22ADM3XX',title:'Amrita Value Programme I',cr:1,pf:false},
    {cat:'HUM',code:'23LSE201',title:'Life Skills for Engineers I',cr:0,pf:true},
  ],
  4:[
    {cat:'SCI',code:'23MAT4XX',title:'Probability and Random Processes',cr:4,pf:false},
    {cat:'CSE',code:'23CSE4XA',title:'Design and Analysis of Algorithms',cr:4,pf:false},
    {cat:'CSE',code:'23CSE4XB',title:'Principles of Programming Languages',cr:3,pf:false},
    {cat:'CSE',code:'23CSE4XC',title:'Computer Organization and Architecture',cr:4,pf:false},
    {cat:'CSE',code:'23CSE4XD',title:'Operating Systems',cr:3,pf:false},
    {cat:'HUM',code:'22ADM4XX',title:'Amrita Value Programme II',cr:1,pf:false},
    {cat:'CSE',code:'23CSE4XE',title:'Free Elective I',cr:2,pf:false},
    {cat:'HUM',code:'23LSE211',title:'Life Skills for Engineers II',cr:0,pf:true},
  ],
  5:[
    {cat:'CSE',code:'23CSE5XX',title:'Machine Learning',cr:4,pf:false},
    {cat:'CSE',code:'23PE5XA',title:'Professional Elective I',cr:3,pf:false},
    {cat:'CSE',code:'23CSE5XA',title:'Computer Networks',cr:3,pf:false},
    {cat:'CSE',code:'23CSE5XB',title:'Theory of Computation',cr:4,pf:false},
    {cat:'CSE',code:'23CSE5XC',title:'Embedded Systems',cr:4,pf:false},
    {cat:'CSE',code:'23PE5XB',title:'Professional Elective II',cr:3,pf:false},
    {cat:'HUM',code:'23LSE301',title:'Life Skills for Engineers III',cr:2,pf:false},
    {cat:'CSE',code:'23LIV390',title:'Live-in-Labs I',cr:3,pf:false},
    {cat:'HUM',code:'23ENV300',title:'Environmental Science',cr:0,pf:true},
  ],
  6:[
    {cat:'CSE',code:'23CSE6XA',title:'Software Engineering',cr:4,pf:false},
    {cat:'CSE',code:'23CSE6XB',title:'Distributed Systems',cr:3,pf:false},
    {cat:'CSE',code:'23CSE6XC',title:'Foundations of Cyber Security',cr:3,pf:false},
    {cat:'CSE',code:'23PE6XA',title:'Professional Elective III',cr:3,pf:false},
    {cat:'CSE',code:'23CSE6XD',title:'Compiler Design',cr:3,pf:false},
    {cat:'CSE',code:'23CSE6XE',title:'Operating Systems Lab',cr:2,pf:false},
    {cat:'PRJ',code:'23PRJ601',title:'Project - Phase 1',cr:2,pf:false},
    {cat:'HUM',code:'23LSE311',title:'Life Skills for Engineers IV',cr:0,pf:true},
    {cat:'CSE',code:'23LIV490',title:'Live-in-Labs II',cr:3,pf:false},
  ],
  7:[
    {cat:'CSE',code:'23PE7XA',title:'Professional Elective IV',cr:3,pf:false},
    {cat:'CSE',code:'23PE7XB',title:'Professional Elective V',cr:3,pf:false},
    {cat:'CSE',code:'23PE7XC',title:'Professional Elective VI',cr:3,pf:false},
    {cat:'CSE',code:'23FE7XX',title:'Free Elective II',cr:2,pf:false},
    {cat:'PRJ',code:'23PRJ701',title:'Project - Phase 2',cr:6,pf:false},
    {cat:'CSE',code:'23CSE7XX',title:'Fundamentals of AI',cr:2,pf:false},
    {cat:'HUM',code:'23LAW300',title:'Indian Constitution',cr:0,pf:true},
  ],
  8:[{cat:'PRJ',code:'19CSE499',title:'Project - Phase 3',cr:6,pf:false}]
};

/* STATE */
let S={
  branch:'',sem:0,page:'overview',
  profile:{name:'',roll:'',email:'',phone:'',batch:''},
  grades:{},customs:{},modes:{},manual:{}
};
function initState(){for(let i=1;i<=8;i++){S.grades[i]={};S.customs[i]=[];S.modes[i]='manual';S.manual[i]=null;}}
initState();

/* HELPERS */
function subs(s){return[...(S.branch==='CSE'?CSE[s]||[]:[]),...S.customs[s]];}
function sgpa(s){
  if(S.modes[s]==='manual')return S.manual[s];
  const ss=subs(s);let tc=0,tp=0;
  ss.forEach(x=>{if(x.pf)return;const k=s+'-'+x.code,g=S.grades[s]?.[k];if(g){tc+=x.cr;tp+=x.cr*(GP[g]||0);}});
  return tc?tp/tc:null;
}
function cgpa(){
  const a=[];for(let i=1;i<=8;i++){const v=sgpa(i);if(v!==null)a.push(v);}
  return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
}
function gc(g){return{O:'gO','A+':'gAp',A:'gA','B+':'gBp',B:'gB',C:'gC',P:'gP',F:'gF'}[g]||'';}
function cc(v){if(v===null)return 'ce';if(v>=8.5)return 'cg';if(v>=6.5)return 'ca';return 'cr';}
function sc(v){if(v===null)return 'var(--t3)';if(v>=8.5)return 'var(--green)';if(v>=6.5)return 'var(--amber)';return 'var(--red)';}
function bc(v){if(v===null)return 'var(--surf3)';if(v>=8.5)return 'var(--green)';if(v>=6.5)return 'var(--amber)';return 'var(--red)';}
function ini(n){if(!n)return '?';return n.trim().split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}

/* APP START/RESET */
function startApp(){
  const b=document.getElementById('sb').value, cs=parseInt(document.getElementById('ss').value);
  if(!b||!cs){alert('Please select branch and semester.');return;}
  S.branch=b;S.sem=cs;
  S.profile={name:document.getElementById('sn').value.trim(),roll:document.getElementById('sr').value.trim(),email:document.getElementById('se').value.trim(),phone:document.getElementById('sp').value.trim(),batch:document.getElementById('sy').value.trim()};
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  renderAll();
}
function resetApp(){if(!confirm('Reset all data?'))return;S={branch:'',sem:0,page:'overview',profile:{name:'',roll:'',email:'',phone:'',batch:''},grades:{},customs:{},modes:{},manual:{}};initState();document.getElementById('setup-screen').style.display='flex';document.getElementById('main-app').style.display='none';}
function goHome(){showPage('overview');}
function showPage(p){S.page=p;renderAll();}

/* RENDER ALL */
function renderAll(){
  const cg=cgpa();
  document.getElementById('sb-branch').textContent=S.profile.name||S.branch;
  document.getElementById('sb-sub').textContent=S.branch+' · Semester '+S.sem+(S.profile.batch?' · '+S.profile.batch:'');
  document.getElementById('sb-cgpa').textContent=cg!==null?cg.toFixed(2):'—';
  const cnt=Array.from({length:8},(_,i)=>sgpa(i+1)).filter(v=>v!==null).length;
  document.getElementById('sb-note').textContent=cnt?'average of '+cnt+' semester'+(cnt>1?'s':''):'no data yet';
  document.getElementById('nav-av').textContent=ini(S.profile.name);
  document.getElementById('nav-name').textContent=S.profile.name||'Profile';

  // sem nav
  let nh='';
  for(let s=1;s<=8;s++){
    const v=sgpa(s),chip=v!==null?v.toFixed(2):'—';
    nh+=`<button class="sb-btn${S.page==='sem-'+s?' active':''}" onclick="showPage('sem-${s}')">
      <span>Sem ${s}${s===S.sem?' ●':''}</span>
      <span class="chip ${cc(v)}">${chip}</span>
    </button>`;
  }
  document.getElementById('sem-nav').innerHTML=nh;

  ['overview','target','profile'].forEach(p=>{
    const el=document.getElementById('nav-'+p);
    if(el)el.className='sb-btn'+(S.page===p?' active':'');
  });

  if(S.page==='overview')rOverview();
  else if(S.page==='target')rTarget();
  else if(S.page==='profile')rProfile();
  else rSem(parseInt(S.page.replace('sem-','')));
}

/* OVERVIEW */
function rOverview(){
  const cg=cgpa();
  let bars='';
  for(let s=1;s<=8;s++){const v=sgpa(s),pct=v?v/10*100:0;bars+=`<div class="bar-col"><div class="bar-v">${v?v.toFixed(2):''}</div><div class="bar-fill-wrap"><div class="bar-fill" style="height:${pct}%;background:${bc(v)}"></div></div><div class="bar-l">S${s}</div></div>`;}

  let ovCards='';
  for(let s=1;s<=8;s++){
    const v=sgpa(s),ss=subs(s),cr=ss.filter(x=>!x.pf).reduce((a,b)=>a+b.cr,0);
    const tag=v!==null?(S.modes[s]==='manual'?`<span class="ov-tag" style="background:var(--bdim);color:var(--blue);">manual SGPA</span>`:`<span class="ov-tag" style="background:var(--gdim);color:var(--green);">subject-wise</span>`):'';
    ovCards+=`<div class="ov-card" onclick="showPage('sem-${s}')"><div class="ov-num">Semester ${s}${s===S.sem?' · Current':''}</div><div class="ov-sgpa" style="color:${sc(v)}">${v?v.toFixed(2):'—'}</div><div class="ov-cr">${cr} credits · ${ss.length} subjects</div>${tag}</div>`;
  }

  const best=(()=>{let bv=null,bs=0;for(let s=1;s<=8;s++){const v=sgpa(s);if(v!==null&&(bv===null||v>bv)){bv=v;bs=s;}}return{v:bv,s:bs};})();
  const totalCr=(()=>{let t=0;for(let s=1;s<=8;s++)subs(s).filter(x=>!x.pf).forEach(x=>t+=x.cr);return t;})();
  const cnt=Array.from({length:8},(_,i)=>sgpa(i+1)).filter(v=>v!==null).length;

  const grefHtml=[{g:'O',p:'10.00',n:'Outstanding'},{g:'A+',p:'9.50',n:'Excellent'},{g:'A',p:'9.00',n:'Very Good'},{g:'B+',p:'8.00',n:'Good'},{g:'B',p:'7.00',n:'Above Avg'},{g:'C',p:'6.00',n:'Average'},{g:'P',p:'5.00',n:'Pass'},{g:'F',p:'0.00',n:'Fail'}]
    .map(r=>`<div class="gref-item"><div><div class="gref-l">${r.g}</div><div class="gref-n">${r.n}</div></div><div class="gref-p">${r.p}</div></div>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="pg-hdr"><h2>Overview</h2><p>All semesters at a glance — click any card to enter grades</p></div>
    <div class="stat-row">
      <div class="stat"><div class="slbl">Overall CGPA</div><div class="sval" style="color:${sc(cg)}">${cg?cg.toFixed(2):'—'}</div><div class="ssub">${cnt?cnt+' sem'+(cnt>1?'s':'')+ ' averaged':'no data yet'}</div></div>
      <div class="stat"><div class="slbl">Best Semester</div><div class="sval">${best.v!==null?'Sem '+best.s:'—'}</div><div class="ssub">${best.v!==null?best.v.toFixed(2)+' SGPA':'—'}</div></div>
      <div class="stat"><div class="slbl">Total Credits</div><div class="sval">${totalCr}</div><div class="ssub">across 8 semesters</div></div>
    </div>
    <div class="chart-card"><h3>SGPA across semesters</h3><div class="bars">${bars}</div></div>
    <div style="font-size:13px;letter-spacing:.8px;color:var(--t3);text-transform:uppercase;margin-bottom:14px;font-weight:500;">All Semesters</div>
    <div class="ov-grid">${ovCards}</div>
    <div class="gref"><h3>Grading reference</h3><div class="gref-grid">${grefHtml}</div></div>`;
}

/* SEMESTER */
function rSem(s){
  const mode=S.modes[s]||'manual', v=sgpa(s), ss=subs(s), cr=ss.filter(x=>!x.pf).reduce((a,b)=>a+b.cr,0);
  const entCr=(()=>{let t=0;ss.filter(x=>!x.pf).forEach(x=>{if(S.grades[s]?.[s+'-'+x.code])t+=x.cr;});return t;})();
  const cg=cgpa();

  let body='';
  if(mode==='manual'){
    const mv=S.manual[s];
    body=`<div class="manual-box">
      <p>Already know your result for Semester ${s}?<br>Enter your SGPA directly below.</p>
      <input class="sgpa-big" id="mi-${s}" type="number" min="0" max="10" step="0.01" placeholder="0.00" value="${mv!==null?mv:''}">
      <button class="save-btn" onclick="saveManual(${s})">Save SGPA</button>
      ${mv!==null?`<div style="font-size:15px;color:var(--t2);">Saved: <span style="color:${sc(mv)};font-weight:700;font-size:20px;">${mv.toFixed(2)}</span></div>`:''}
    </div>`;
  } else {
    const base=(S.branch==='CSE'?CSE[s]||[]:[]);
    const customs=S.customs[s]||[];
    let rows='';
    base.forEach(x=>{
      const k=s+'-'+x.code,cur=S.grades[s]?.[k]||'';
      rows+=`<tr>
        <td><span class="cat-pill c${x.cat}">${x.cat}</span></td>
        <td style="font-size:13px;color:var(--t3);">${x.code}</td>
        <td>${x.title}</td>
        <td><span class="cr-pill">${x.pf?'P/F':x.cr+' cr'}</span></td>
        <td>${x.pf
          ?`<select class="gsel" onchange="setG(${s},'${k}',this.value)"><option value="">—</option><option value="P"${cur==='P'?' selected':''}>P — Pass</option><option value="F"${cur==='F'?' selected':''}>F — Fail</option></select><span class="pf-note">not in SGPA</span>`
          :`<select class="gsel ${gc(cur)}" onchange="setGE(${s},'${k}',this.value,this)"><option value="">— Select grade</option>${GRADES.map(g=>`<option value="${g}"${cur===g?' selected':''}>${g}  (${GP[g]})</option>`).join('')}</select>`
        }</td>
      </tr>`;
    });
    customs.forEach((x,ci)=>{
      const k=s+'-'+x.code,cur=S.grades[s]?.[k]||'';
      rows+=`<tr>
        <td><span class="cat-pill ccustom">custom</span></td>
        <td style="font-size:13px;color:var(--t3);">—</td>
        <td>${x.title}</td>
        <td><span class="cr-pill">${x.pf?'P/F':x.cr+' cr'}</span></td>
        <td style="display:flex;gap:8px;align-items:center;">
          ${x.pf
            ?`<select class="gsel" onchange="setG(${s},'${k}',this.value)"><option value="">—</option><option value="P"${cur==='P'?' selected':''}>P</option><option value="F"${cur==='F'?' selected':''}>F</option></select>`
            :`<select class="gsel ${gc(cur)}" onchange="setGE(${s},'${k}',this.value,this)"><option value="">— Select grade</option>${GRADES.map(g=>`<option value="${g}"${cur===g?' selected':''}>${g}  (${GP[g]})</option>`).join('')}</select>`
          }
          <button class="del-btn" onclick="delC(${s},${ci})">remove</button>
        </td>
      </tr>`;
    });
    rows+=`<tr class="add-row"><td colspan="5" style="padding:14px 18px;"><div class="add-inner">
      <input id="an-${s}" class="ai w" type="text" placeholder="Subject name">
      <input id="ac-${s}" class="ai n" type="number" min="0" max="12" step="0.5" placeholder="Credits">
      <select id="ap-${s}" class="gsel" style="min-width:130px;"><option value="no">Graded</option><option value="yes">P/F only</option></select>
      <button class="add-btn" onclick="addC(${s})">+ Add subject</button>
    </div></td></tr>`;
    body=`<div class="tcard">
      <div class="tcard-hdr"><h3>Subject-wise grades</h3><span>${entCr} / ${cr} credits filled</span></div>
      <table><thead><tr><th style="width:75px">Cat</th><th style="width:120px">Code</th><th>Subject</th><th style="width:90px">Credits</th><th style="width:170px">Grade</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  }

  document.getElementById('content').innerHTML=`
    <div class="pg-hdr">
      <h2>Semester ${s}${s===S.sem?' <span style="font-size:17px;color:var(--accent2);font-weight:500;"> · Current</span>':''}</h2>
      <p>${cr} graded credits · ${ss.length} subjects${v!==null?' · SGPA: <strong style="color:'+sc(v)+'">'+v.toFixed(2)+'</strong>':''}</p>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="slbl">SGPA</div><div class="sval" style="color:${sc(v)}">${v?v.toFixed(2):'—'}</div><div class="ssub">${v!==null?getRating(v):'enter below'}</div></div>
      <div class="stat"><div class="slbl">Credits (graded)</div><div class="sval">${cr}</div><div class="ssub">this semester</div></div>
      <div class="stat"><div class="slbl">Overall CGPA</div><div class="sval">${cg?cg.toFixed(2):'—'}</div><div class="ssub">live update</div></div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn${mode==='manual'?' active':''}" onclick="setMode(${s},'manual')">Enter SGPA directly</button>
      <button class="mode-btn${mode==='detailed'?' active':''}" onclick="setMode(${s},'detailed')">Enter subject-wise grades</button>
    </div>
    ${body}`;
}

function getRating(v){
  if(v>=9.5)return 'Outstanding / Excellent';if(v>=9)return 'Very Good';if(v>=8)return 'Good';if(v>=7)return 'Above Average';if(v>=6)return 'Average';if(v>=5)return 'Pass';return 'Fail';
}

function setMode(s,m){S.modes[s]=m;renderAll();}
function setG(s,k,v){S.grades[s][k]=v;renderAll();}
function setGE(s,k,v,el){S.grades[s][k]=v;el.className='gsel '+gc(v);renderAll();}
function saveManual(s){const v=parseFloat(document.getElementById('mi-'+s)?.value);if(isNaN(v)||v<0||v>10){alert('Enter valid SGPA (0–10).');return;}S.manual[s]=Math.round(v*100)/100;renderAll();}
function addC(s){const n=document.getElementById('an-'+s)?.value.trim(),c=parseFloat(document.getElementById('ac-'+s)?.value)||0,p=document.getElementById('ap-'+s)?.value==='yes';if(!n){alert('Enter subject name.');return;}S.customs[s].push({cat:'custom',code:'c'+Date.now(),title:n,cr:c,pf:p});renderAll();}
function delC(s,i){S.customs[s].splice(i,1);renderAll();}

/* PROFILE */
function rProfile(){
  const p=S.profile;
  let semBars='';
  for(let s=1;s<=8;s++){const v=sgpa(s),pct=v?v/10*100:0;semBars+=`<div class="sem-bar-row"><span class="sbr-lbl">Semester ${s}</span><div class="sbr-wrap"><div class="sbr-fill" style="width:${pct}%;background:${bc(v)}"></div></div><span class="sbr-val" style="color:${sc(v)}">${v?v.toFixed(2):'—'}</span></div>`;}

  document.getElementById('content').innerHTML=`
    <div class="pg-hdr"><h2>My Profile</h2><p>Your personal details and full academic record</p></div>
    <div class="prof-grid">
      <div class="prof-card">
        <h3>Personal Details</h3>
        <div style="display:flex;align-items:center;gap:18px;margin-bottom:24px;">
          <div class="big-av">${ini(p.name)||'?'}</div>
          <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;">${p.name||'—'}</div><div style="font-size:14px;color:var(--t3);margin-top:3px;">${p.roll||'Roll number not set'}</div></div>
        </div>
        <div class="pf"><label>Full Name</label><input id="pn" type="text" value="${p.name}" placeholder="Your full name"></div>
        <div class="pf"><label>Roll Number</label><input id="pr" type="text" value="${p.roll}" placeholder="Roll number"></div>
        <div class="pf"><label>Branch</label><input type="text" value="${S.branch}" disabled style="opacity:.5;cursor:not-allowed;"></div>
        <div class="pf"><label>Batch / Year</label><input id="pb" type="text" value="${p.batch}" placeholder="e.g. 2023–2027"></div>
        <div class="pf"><label>Email</label><input id="pe" type="email" value="${p.email}" placeholder="email@example.com"></div>
        <div class="pf"><label>Phone</label><input id="pp" type="text" value="${p.phone}" placeholder="+91 XXXXX XXXXX"></div>
        <button class="save-prof-btn" onclick="saveProf()">Save changes</button>
      </div>
      <div class="prof-card">
        <h3>Academic Record</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
          <div class="stat" style="padding:16px 18px;"><div class="slbl">CGPA</div><div class="sval" style="font-size:30px;color:${sc(cgpa())}">${cgpa()?cgpa().toFixed(2):'—'}</div></div>
          <div class="stat" style="padding:16px 18px;"><div class="slbl">Current Sem</div><div class="sval" style="font-size:30px;">${S.sem}</div></div>
        </div>
        <div style="font-size:12px;letter-spacing:.7px;color:var(--t3);text-transform:uppercase;margin-bottom:14px;font-weight:500;">SGPA per semester</div>
        <div class="sem-bars">${semBars}</div>
      </div>
    </div>`;
}

function saveProf(){
  S.profile.name=document.getElementById('pn').value.trim();
  S.profile.roll=document.getElementById('pr').value.trim();
  S.profile.batch=document.getElementById('pb').value.trim();
  S.profile.email=document.getElementById('pe').value.trim();
  S.profile.phone=document.getElementById('pp').value.trim();
  renderAll();
}

/* TARGET PLANNER */
function rTarget(){
  document.getElementById('content').innerHTML=`
    <div class="pg-hdr"><h2>Target Planner</h2><p>Set a CGPA goal and find out exactly what SGPA you need each remaining semester</p></div>
    <div class="tplan-card">
      <h3>Set your goal</h3>
      <p>Enter your desired CGPA and the semester by which you want to hit it. We'll calculate the required SGPA for each remaining semester.</p>
      <div class="t-inputs">
        <div class="ti"><label>Target CGPA</label><input id="tc" type="number" min="0" max="10" step="0.01" placeholder="e.g. 8.50"></div>
        <div class="ti">
          <label>Achieve by semester</label>
          <div style="position:relative;">
            <select id="ts" style="appearance:none;-webkit-appearance:none;padding:13px 16px;background:var(--surf2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;min-width:170px;">
              ${[1,2,3,4,5,6,7,8].map(s=>`<option value="${s}"${s===S.sem?' selected':''}>Semester ${s}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="calc-btn" onclick="calcTarget()">Calculate →</button>
      </div>
      <div id="t-result"></div>
    </div>
    <div class="tplan-card" style="background:var(--surf2);border-color:var(--border2);">
      <h3>How the calculation works</h3>
      <p style="color:var(--t2);font-size:15px;line-height:1.8;">
        CGPA = simple average of all SGPAs up to that semester.<br>
        Required SGPA = <strong style="color:var(--text);">(Target CGPA × n) − sum of existing SGPAs</strong><br>
        divided equally across all remaining semesters, where <em>n</em> = target semester number.
      </p>
    </div>`;
}

function calcTarget(){
  const tCGPA=parseFloat(document.getElementById('tc')?.value);
  const tSem=parseInt(document.getElementById('ts')?.value);
  const el=document.getElementById('t-result');
  if(isNaN(tCGPA)||tCGPA<0||tCGPA>10){el.innerHTML='<p style="color:var(--red);font-size:15px;margin-top:8px;">Please enter a valid CGPA between 0 and 10.</p>';return;}

  let existing=[],remaining=[];
  for(let s=1;s<=tSem;s++){const v=sgpa(s);if(v!==null)existing.push({s,v});else remaining.push(s);}

  if(!remaining.length){
    const actual=existing.reduce((a,b)=>a+b.v,0)/tSem;
    el.innerHTML=actual>=tCGPA
      ?`<div class="t-possible"><h4>🎉 Goal already achieved!</h4><p>Your CGPA up to Semester ${tSem} is already ${actual.toFixed(2)}.</p></div>`
      :`<div class="t-impossible"><div style="font-size:24px">⚠️</div><div><h4>All semesters already filled</h4><p>Your CGPA up to Semester ${tSem} is ${actual.toFixed(2)}. There are no remaining semesters to adjust.</p></div></div>`;
    return;
  }

  const sumE=existing.reduce((a,b)=>a+b.v,0);
  const needed=tCGPA*tSem-sumE;
  const reqEach=needed/remaining.length;
  const maxPossible=(sumE+10*remaining.length)/tSem;
  let html='';

  if(reqEach>10){
    html+=`<div class="t-impossible">
      <div style="font-size:26px;flex-shrink:0">❌</div>
      <div>
        <h4>Target not achievable</h4>
        <p>Even with a perfect <strong>10.00 (O)</strong> in all ${remaining.length} remaining semester${remaining.length>1?'s':''}, the maximum CGPA you can reach by Semester ${tSem} is <strong>${maxPossible.toFixed(2)}</strong>. Your target of ${tCGPA.toFixed(2)} is out of reach.</p>
      </div>
    </div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:16px;">Best case — scoring <strong style="color:var(--amber);">O (10.00)</strong> every remaining semester gives you a CGPA of <strong style="color:var(--amber);">${maxPossible.toFixed(2)}</strong></div>`;
    html+=`<div class="req-grid">`;
    existing.forEach(({s,v})=>html+=`<div class="req-card" style="opacity:.55;"><div class="req-sn">Semester ${s}</div><div class="req-v" style="color:${sc(v)}">${v.toFixed(2)}</div><div class="req-note">already done</div></div>`);
    remaining.forEach(s=>html+=`<div class="req-card" style="border-color:rgba(245,158,11,0.3);"><div class="req-sn">Semester ${s}</div><div class="req-v" style="color:var(--amber)">10.00</div><div class="req-note">best case (O)</div></div>`);
    html+=`</div>`;
  } else if(reqEach<0){
    html=`<div class="t-possible"><h4>🎉 Target already on track!</h4><p>Based on your existing SGPAs, your CGPA is already on course to exceed ${tCGPA.toFixed(2)} by Semester ${tSem}. Current projected CGPA: <strong>${(sumE/existing.length).toFixed(2)}</strong>. Keep it up!</p></div>`;
  } else {
    const col=reqEach>=8.5?'var(--green)':reqEach>=6.5?'var(--amber)':'var(--red)';
    html+=`<div class="t-possible">
      <h4>✓ Target is achievable</h4>
      <p>You need <strong>${reqEach.toFixed(2)} SGPA</strong> in each of the ${remaining.length} remaining semester${remaining.length>1?'s':''} to reach a CGPA of <strong>${tCGPA.toFixed(2)}</strong> by Semester ${tSem}.</p>
    </div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:16px;">Required SGPA per remaining semester:</div>
    <div class="req-grid">`;
    existing.forEach(({s,v})=>html+=`<div class="req-card" style="opacity:.55;"><div class="req-sn">Semester ${s}</div><div class="req-v" style="color:${sc(v)}">${v.toFixed(2)}</div><div class="req-note">already done</div></div>`);
    remaining.forEach(s=>html+=`<div class="req-card" style="border-color:${col}40;"><div class="req-sn">Semester ${s}</div><div class="req-v" style="color:${col}">${reqEach.toFixed(2)}</div><div class="req-note">required</div></div>`);
    html+=`</div>`;
  }
  el.innerHTML=html;
}
</script>
</body>
</html>
